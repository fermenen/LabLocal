<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Iniciar sesión — LabLocal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #F2F2F7; -webkit-font-smoothing: antialiased; }
    .field {
      background: #FFFFFF; border: 1.5px solid #E5E5EA; border-radius: 10px;
      padding: .75rem 1rem; font-size: .9rem; width: 100%; outline: none; color: #1C1C1E;
      transition: border-color .15s; font-family: 'Inter', sans-serif;
    }
    .field:focus { border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0,122,255,.12); }
    .field::placeholder { color: #AEAEB2; }
  </style>
</head>
<body class="min-h-screen bg-[#F2F2F7] flex flex-col items-center justify-center px-5 py-10">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-[22px]
                  bg-[#007AFF] shadow-xl shadow-blue-500/30 mb-5">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-[#1C1C1E] tracking-tight">LabLocal</h1>
      <p class="text-sm text-[#8E8E93] mt-1.5">Tus analíticas. Tu servidor.</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-[20px] shadow-sm overflow-hidden">

      {% if form.errors %}
      <div class="px-5 pt-4 pb-0">
        <div class="bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl">
          Usuario o contraseña incorrectos.
        </div>
      </div>
      {% endif %}

      <form method="post" class="px-5 py-5 space-y-3.5">
        {% csrf_token %}
        <div>
          <label class="block text-xs font-semibold text-[#8E8E93] uppercase tracking-wider mb-1.5">
            Usuario
          </label>
          <input type="text" name="username" id="id_username" autofocus required
                 class="field" placeholder="nombre de usuario" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-[#8E8E93] uppercase tracking-wider mb-1.5">
            Contraseña
          </label>
          <input type="password" name="password" id="id_password" required
                 class="field" placeholder="••••••••" />
        </div>
        <input type="hidden" name="next" value="{{ next }}" />
        <button type="submit"
          class="w-full mt-1 py-3.5 rounded-xl font-bold text-sm text-white bg-[#007AFF]
                 shadow-md shadow-blue-500/25 active:opacity-80 active:scale-[.98] transition-all">
          Entrar
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-[#AEAEB2] mt-6">
      Open source · MIT · Sin enviar datos a terceros
    </p>
  </div>

</body>
</html>
