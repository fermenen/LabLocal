{% load i18n static %}
{% get_current_language as CURRENT_LANG %}
<!DOCTYPE html>
<html lang="{{ CURRENT_LANG }}" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>{% block title %}LabLocal{% endblock %}</title>

  <link href="{% static 'labs/css/inter.css' %}" rel="stylesheet">
  <script src="{% static 'labs/js/tailwindcss_browser_4.js' %}"></script>
  <script src="{% static 'labs/js/chartjs_4.5.1.js' %}"></script>
  <script defer src="{% static 'labs/js/alpinejs_3.js' %}"></script>

  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'Inter', system-ui, sans-serif;

      --color-ios-bg:     #F2F2F7;
      --color-ios-card:   #FFFFFF;
      --color-ios-blue:   #007AFF;
      --color-ios-green:  #34C759;
      --color-ios-yellow: #FF9F0A;
      --color-ios-red:    #FF3B30;
      --color-ios-gray1:  #8E8E93;
      --color-ios-gray2:  #AEAEB2;
      --color-ios-gray3:  #C7C7CC;
      --color-ios-gray4:  #D1D1D6;
      --color-ios-gray5:  #E5E5EA;
      --color-ios-gray6:  #F2F2F7;

      --max-width-mobile: 430px;
      --max-width-app:    960px;

      --radius-2_5xl: 20px;
    }

    /* Clases usadas dinámicamente en Alpine :class que el scanner no detecta */
    @source inline("bg-[#1C1C1E] border-[#1C1C1E] text-white rotate-45");
  </style>

  {% block extra_head %}{% endblock %}
</head>

<body x-data class="min-h-screen bg-[#F2F2F7]">

  {% if messages %}
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-2 w-full max-w-lg px-4 pointer-events-none">
    {% for message in messages %}
    <div x-data="{ show: true }"
         x-show="show"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-4"
         x-init="setTimeout(() => show = false, 5000)"
         class="pointer-events-auto w-full flex items-center justify-between px-4 py-3 text-sm rounded-2xl shadow-xl border
                {% if message.tags == 'error' %}bg-red-50 border-red-200 text-red-700{% elif message.tags == 'warning' %}bg-amber-50 border-amber-200 text-amber-800{% else %}bg-green-50 border-green-200 text-green-800{% endif %}">
      <span>{{ message }}</span>
      <button @click="show = false" class="ml-3 text-lg opacity-40 hover:opacity-70 cursor-pointer">&times;</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  {% block body %}{% endblock %}

  {% block extra_js %}{% endblock %}
</body>
</html>
