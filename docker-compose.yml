services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - lablocal_data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  lablocal_data:
    driver: local
